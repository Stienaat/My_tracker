<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Tracker bekijken</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link 
    rel="stylesheet" 
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  >

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #alert {
      padding: 12px;
      text-align: center;
      font-weight: bold;
      background: #eee;
    }

    #alert.sos {
      background: red;
      color: white;
      font-size: 24px;
    }

    #map {
      height: calc(100vh - 50px);
    }
  </style>
</head>
<body>

  <div id="alert">Geen SOS</div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
